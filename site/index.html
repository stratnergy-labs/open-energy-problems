<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Energy Problems</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #18221f;
      background: #f7f4ee;
    }
    body { margin: 0; }
    main { max-width: 1180px; margin: 0 auto; padding: 40px 20px 64px; }
    header { padding: 44px 0 28px; border-bottom: 1px solid #d9d2c3; }
    .eyebrow { text-transform: uppercase; letter-spacing: .08em; color: #5e6b62; font-size: 12px; }
    h1 { font-size: clamp(40px, 7vw, 86px); line-height: .95; margin: 12px 0; max-width: 820px; }
    header p:last-child { max-width: 620px; font-size: 20px; color: #3f4b46; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; padding: 22px 0; }
    label { display: grid; gap: 6px; font-size: 12px; text-transform: uppercase; color: #5e6b62; }
    select { min-width: 190px; border: 1px solid #c8c0b0; background: #fffefa; border-radius: 6px; padding: 10px; color: #18221f; }
    .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 20px; }
    .summary div { border-top: 3px solid #2f6358; background: #fffefa; padding: 16px; }
    .summary strong { display: block; font-size: 30px; }
    .summary span { color: #5e6b62; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .card { background: #fffefa; border: 1px solid #d9d2c3; border-radius: 8px; padding: 18px; min-height: 260px; }
    .cardTop, .chips { display: flex; justify-content: space-between; gap: 8px; color: #5e6b62; font-size: 13px; }
    h2 { font-size: 20px; margin: 18px 0 8px; }
    h3 { font-size: 13px; text-transform: uppercase; margin-top: 18px; color: #5e6b62; }
    ul { padding-left: 18px; }
    .chips span { border: 1px solid #c8c0b0; border-radius: 999px; padding: 5px 8px; }
    @media (max-width: 720px) { .summary { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Stratnergy public reference layer</p>
      <h1>Open Energy Problems</h1>
      <p>AI x OSS reference problems for software-defined energy markets.</p>
    </header>

    <section class="controls" aria-label="Problem filters">
      <label>Lane<select id="lane"></select></label>
      <label>Status<select id="status"></select></label>
      <label>Evidence<select id="evidence"></select></label>
    </section>

    <section class="summary">
      <div><strong id="problemCount">0</strong><span>problems</span></div>
      <div><strong id="contributionCount">0</strong><span>contributions</span></div>
      <div><strong id="shownCount">0</strong><span>shown</span></div>
    </section>

    <section class="grid" id="grid"></section>
  </main>

  <script>
    const state = { lane: 'all', status: 'all', evidence: 'all', problems: [], contributions: [] };
    const byId = (id) => document.getElementById(id);
    const unique = (rows, field) => Array.from(new Set(rows.map((row) => row[field]))).sort();

    function fillSelect(id, values) {
      const select = byId(id);
      select.innerHTML = '<option value="all">All</option>' + values.map((value) => `<option value="${value}">${value}</option>`).join('');
      select.addEventListener('change', () => {
        state[id] = select.value;
        render();
      });
    }

    function render() {
      const shown = state.problems.filter((problem) =>
        (state.lane === 'all' || problem.lane === state.lane) &&
        (state.status === 'all' || problem.status === state.status) &&
        (state.evidence === 'all' || problem.evidence_strength === state.evidence)
      );
      byId('problemCount').textContent = state.problems.length;
      byId('contributionCount').textContent = state.contributions.length;
      byId('shownCount').textContent = shown.length;
      byId('grid').innerHTML = shown.map((problem) => {
        const related = state.contributions.filter((item) => item.problem_id === problem.id);
        return `<article class="card">
          <div class="cardTop"><span>${problem.id}</span><span>O${problem.openness_level} / ${problem.evidence_strength}</span></div>
          <h2>${problem.title}</h2>
          <p>${problem.lane} · ${problem.status} · ${problem.geography}</p>
          <div class="chips"><span>AI ${problem.ai_relevance}</span><span>Risk ${problem.market_integrity_risk}</span></div>
          <h3>Related artefacts</h3>
          <ul>${related.map((item) => `<li>${item.title}</li>`).join('')}</ul>
        </article>`;
      }).join('');
    }

    async function init() {
      const [problems, contributions] = await Promise.all([
        fetch('../index/problems.json').then((response) => response.json()),
        fetch('../index/contributions.json').then((response) => response.json())
      ]);
      state.problems = problems;
      state.contributions = contributions;
      fillSelect('lane', unique(problems, 'lane'));
      fillSelect('status', unique(problems, 'status'));
      fillSelect('evidence', unique(problems, 'evidence_strength'));
      render();
    }

    init().catch((error) => {
      byId('grid').innerHTML = `<article class="card"><h2>Unable to load local JSON</h2><p>${error.message}</p></article>`;
    });
  </script>
</body>
</html>
